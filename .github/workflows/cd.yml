name: CD
on:
  push:
    branches: [main]
permissions:
  id-token: write
  contents: write          # the version_bump job commits VERSION + DEPLOY-LOG.md
env:
  TF_STATE_RG: ${{ vars.TF_STATE_RG }}
  TF_STATE_SA: ${{ vars.TF_STATE_SA }}
  TF_STATE_CONTAINER: ${{ vars.TF_STATE_CONTAINER }}
jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_NONPROD }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/tf-plan
        with:
          root: capacities/dev/foundation
          plan-name: dev-foundation
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_NONPROD }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/tf-plan
        with:
          root: capacities/dev/platform
          plan-name: dev-platform
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/tf-plan
        with:
          root: capacities/prod/foundation
          plan-name: prod-foundation
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/tf-plan
        with:
          root: capacities/prod/platform
          plan-name: prod-platform
  change_approval:
    needs: plan
    runs-on: ubuntu-latest
    environment: fabricdeploy-change-approval
    steps:
      - run: echo "Planned changes approved."
  deploy_nonprod:
    needs: change_approval
    runs-on: ubuntu-latest
    environment: fabricdeploy-nonprod
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_NONPROD }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/tf-apply
        with:
          root: capacities/dev/foundation
          plan-name: dev-foundation
      - uses: ./.github/actions/tf-apply
        with:
          root: capacities/dev/platform
          plan-name: dev-platform
      - uses: ./.github/actions/tf-content
        with:
          root: capacities/dev/content
          platform-outputs: dev-platform-outputs.json
          env-name: dev
      - uses: ./.github/actions/tf-content
        with:
          root: capacities/dev/content
          platform-outputs: dev-platform-outputs.json
          env-name: test
  deploy_prod:
    needs: deploy_nonprod
    runs-on: ubuntu-latest
    environment: fabricdeploy-prod
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/tf-apply
        with:
          root: capacities/prod/foundation
          plan-name: prod-foundation
      - uses: ./.github/actions/tf-apply
        with:
          root: capacities/prod/platform
          plan-name: prod-platform
      - uses: ./.github/actions/tf-content
        with:
          root: capacities/prod/content
          platform-outputs: prod-platform-outputs.json
          env-name: prod
  version_bump:
    needs: deploy_prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - env:
          CI_RUN_ID: ${{ github.run_id }}
        run: bash .github/fabricdeploy/bump-version.sh VERSION
