name: tf-content
description: deploy content using the platform layer's workspace outputs
inputs:
  root:
    required: true
  platform-outputs:
    required: true
  env-name:
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      working-directory: ${{ inputs.root }}
      run: |
        set -e
        WS=$(jq -r ".workspace_id_${{ inputs.env-name }}.value // empty" "${{ github.workspace }}/${{ inputs.platform-outputs }}")
        terraform init -input=false -no-color \
          -backend-config="resource_group_name=${TF_STATE_RG}" \
          -backend-config="storage_account_name=${TF_STATE_SA}" \
          -backend-config="container_name=${TF_STATE_CONTAINER}"
        terraform apply -input=false -no-color -auto-approve -var="workspace_id_${{ inputs.env-name }}=$WS"
