name: tf-plan
description: terraform init (backend) + plan -out, uploaded as an artifact
inputs:
  root:
    required: true
  plan-name:
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      working-directory: ${{ inputs.root }}
      run: |
        set -e
        terraform init -input=false -no-color \
          -backend-config="resource_group_name=${TF_STATE_RG}" \
          -backend-config="storage_account_name=${TF_STATE_SA}" \
          -backend-config="container_name=${TF_STATE_CONTAINER}"
        terraform plan -input=false -no-color -out="${{ github.workspace }}/${{ inputs.plan-name }}.tfplan"
    - uses: actions/upload-artifact@v4
      with:
        name: plan-${{ inputs.plan-name }}
        path: ${{ github.workspace }}/${{ inputs.plan-name }}.tfplan
