name: tf-apply
description: download the approved plan artifact + terraform apply
inputs:
  root:
    required: true
  plan-name:
    required: true
runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: plan-${{ inputs.plan-name }}
        path: ${{ github.workspace }}/plans
    - shell: bash
      working-directory: ${{ inputs.root }}
      run: |
        set -e
        terraform init -input=false -no-color \
          -backend-config="resource_group_name=${TF_STATE_RG}" \
          -backend-config="storage_account_name=${TF_STATE_SA}" \
          -backend-config="container_name=${TF_STATE_CONTAINER}"
        terraform apply -input=false -no-color -auto-approve "${{ github.workspace }}/plans/${{ inputs.plan-name }}.tfplan"
        terraform output -json > "${{ github.workspace }}/${{ inputs.plan-name }}-outputs.json"
